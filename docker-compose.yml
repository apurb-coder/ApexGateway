version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: apex-postgres
    restart: always
    env_file:
      - ./server/marketplace/.env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - apex-network

  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - apex-network

  marketplace-api:
    build:
      context: ./server/marketplace
      dockerfile: Dockerfile
    container_name: apex-marketplace
    restart: always
    env_file:
      - ./server/marketplace/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - apex-network

  gateway-api:
    build:
      context: ./server/gateway
      dockerfile: Dockerfile
    container_name: apex-gateway-proxy
    restart: always
    env_file:
      - ./server/gateway/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    networks:
      - apex-network

volumes:
  pgdata:
  redisdata:

networks:
  apex-network:
    driver: bridge
